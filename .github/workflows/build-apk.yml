name: Build WebView APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_ID: ${{ github.event.client_payload.build_id }}
      CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      UPLOAD_URL: ${{ github.event.client_payload.upload_url }}
      ARTIFACT_PATH: ${{ github.event.client_payload.artifact_path }}
      APP_CONFIG: ${{ github.event.client_payload.config }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python 3 and ImageMagick
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick python3
          python3 --version

      - name: Generate Android project
        run: python3 orchestrator.py

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compile APK or AAB
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          if [ -f ".build_aab" ]; then
            echo "Building AAB (release)..."
            ./gradlew bundleRelease --no-daemon --stacktrace
          else
            echo "Building APK (debug)..."
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Locate built artifact
        id: locate
        run: |
          set -e
          if [ -f ".build_aab" ]; then
            FILE=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          else
            FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          fi
          if [ -z "$FILE" ]; then echo "No build artifact found"; exit 1; fi
          echo "artifact_file=$FILE" >> "$GITHUB_OUTPUT"
          ls -lh "$FILE"

      - name: Upload artifact to Lovable Cloud storage
        run: |
          set -e
          FILE="${{ steps.locate.outputs.artifact_file }}"
          echo "Uploading $FILE to $ARTIFACT_PATH"
          curl --fail-with-body -X PUT \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary "@${FILE}" \
            "$UPLOAD_URL"

      - name: Notify build result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"
          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\", \"artifact_path\": \"$ARTIFACT_PATH\"}"
          fi
