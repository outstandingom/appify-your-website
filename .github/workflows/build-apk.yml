name: Build WebView APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_ID: ${{ github.event.client_payload.build_id }}
      CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      APP_CONFIG: ${{ github.event.client_payload.config }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python 3 and ImageMagick
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick python3 jq
          python3 --version

      - name: Generate Android project
        run: python3 orchestrator.py

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compile APK or AAB
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          if [ -f ".build_aab" ]; then
            echo "Building AAB (release)..."
            ./gradlew bundleRelease --no-daemon --stacktrace
          else
            echo "Building APK (debug)..."
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Stage built artifact
        id: locate
        run: |
          set -e
          mkdir -p out
          if [ -f ".build_aab" ]; then
            FILE=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
            EXT=aab
          else
            FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
            EXT=apk
          fi
          if [ -z "$FILE" ]; then echo "No build artifact found"; exit 1; fi
          cp "$FILE" "out/app.${EXT}"
          ls -lh out/

      - name: Upload artifact to GitHub
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ env.BUILD_ID }}
          path: out/*
          retention-days: 7

      - name: Update Supabase with artifact URL
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUILD_ID: ${{ env.BUILD_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "🔍 Getting artifact URL..."
          
          # Get artifact URL and CLEAN it (remove hidden characters)
          RAW_URL=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            | jq -r '.artifacts[0].archive_download_url')
          
          # Clean the URL - remove carriage returns, newlines, and trim whitespace
          ARTIFACT_URL=$(echo "$RAW_URL" | tr -d '\r\n' | xargs)
          
          echo "📦 Raw URL: $RAW_URL"
          echo "📦 Clean URL: $ARTIFACT_URL"
          
          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "❌ No artifact URL found"
            exit 1
          fi
          
          # Verify URL format - must start with https://
          if [[ ! "$ARTIFACT_URL" =~ ^https:// ]]; then
            echo "❌ Invalid URL format: $ARTIFACT_URL"
            exit 1
          fi
          
          # Method 1: Use printf to create JSON (avoids file issues)
          echo "📤 Updating Supabase with artifact URL..."
          
          UPDATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Create JSON using printf with %q to escape properly
          printf '{"build_url":"%s","status":"completed","updated_at":"%s"}\n' \
            "$ARTIFACT_URL" "$UPDATED_AT" > patch_data.json
          
          # Show what we're sending
          echo "📄 JSON payload:"
          cat patch_data.json
          
          # Use the file for the request
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH \
            "$SUPABASE_URL/rest/v1/apk_builds?build_id=eq.$BUILD_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @patch_data.json)
          
          # Check response
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 HTTP Status: $HTTP_CODE"
          echo "📊 Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Supabase updated successfully!"
          else
            echo "❌ Supabase update failed with status: $HTTP_CODE"
            exit 1
          fi

      - name: Notify build result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"
          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\"}"
          fi
