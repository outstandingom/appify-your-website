              // ═══════════════════════════════════════
              // NAVIGATION MODULE
              // ═══════════════════════════════════════
              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                      webView.goBack();
                      return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              // ═══════════════════════════════════════
              // CONNECTIVITY CHECK
              // ═══════════════════════════════════════
              private boolean isOnline() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(CONNECTIVITY_SERVICE);
                  NetworkInfo netInfo = cm != null ? cm.getActiveNetworkInfo() : null;
                  return netInfo != null && netInfo.isConnected();
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == FILE_CHOOSER_REQUEST) {
                      if (fileUploadCallback != null) {
                          Uri[] results = null;
                          if (resultCode == Activity.RESULT_OK) {
                              // Check if data came from file picker
                              if (data != null && data.getDataString() != null) {
                                  results = new Uri[]{Uri.parse(data.getDataString())};
                              }
                              // Check if camera captured an image via FileProvider
                              else if (cameraImageUri != null) {
                                  results = new Uri[]{cameraImageUri};
                              }
                          }
                          fileUploadCallback.onReceiveValue(results);
                          fileUploadCallback = null;
                      }
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode, @NonNull String[] permissions, @NonNull int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);

                  boolean granted = grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED;

                  switch (requestCode) {
                      case CAMERA_PERMISSION_FOR_UPLOAD:
                          // Camera permission resolved — launch file chooser regardless
                          launchFileChooser();
                          break;

                      case LOCATION_PERMISSION_CODE:
                          // Geolocation permission resolved — inform WebView
                          if (geoCallback != null) {
                              geoCallback.invoke(geoOrigin, granted, false);
                              geoCallback = null;
                              geoOrigin = null;
                          }
                          break;

                      case WEB_CAMERA_PERMISSION_CODE:
                          // WebRTC camera permission resolved
                          if (pendingWebPermissionRequest != null) {
                              if (granted) {
                                  pendingWebPermissionRequest.grant(pendingWebPermissionRequest.getResources());
                              } else {
                                  pendingWebPermissionRequest.deny();
                              }
                              pendingWebPermissionRequest = null;
                          }
                          break;

                      case NOTIFICATION_PERMISSION_CODE:
                      case ALL_PERMISSIONS_CODE:
                          // Informational only
                          break;
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  CookieManager.getInstance().flush();
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  CookieManager.getInstance().flush();
              }
          }
