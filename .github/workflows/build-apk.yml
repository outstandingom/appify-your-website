name: Build WebView APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y imagemagick jq

      - name: Parse config and create Android project
        run: |
          # Parse the JSON config string
          BUILD_ID="${{ github.event.client_payload.build_id }}"
          CONFIG='${{ github.event.client_payload.config }}'

          APP_NAME=$(echo "$CONFIG" | jq -r '.app_name')
          WEBSITE_URL=$(echo "$CONFIG" | jq -r '.website_url')
          ICON_URL=$(echo "$CONFIG" | jq -r '.icon_url // empty')
          CUSTOM_PKG=$(echo "$CONFIG" | jq -r '.package_name // empty')
          SPLASH_COLOR=$(echo "$CONFIG" | jq -r '.splash_color // "#10B981"')
          STATUS_BAR_COLOR=$(echo "$CONFIG" | jq -r '.status_bar_color // "#000000"')
          ENABLE_PUSH=$(echo "$CONFIG" | jq -r '.enable_push // false')
          ENABLE_OFFLINE=$(echo "$CONFIG" | jq -r '.enable_offline // false')
          OFFLINE_MSG=$(echo "$CONFIG" | jq -r '.offline_message // "You are offline."')
          ENABLE_ANALYTICS=$(echo "$CONFIG" | jq -r '.enable_analytics // false')
          ENABLE_COOKIES=$(echo "$CONFIG" | jq -r '.enable_cookies // true')
          ENABLE_ADMOB=$(echo "$CONFIG" | jq -r '.enable_admob // false')
          ADMOB_BANNER=$(echo "$CONFIG" | jq -r '.admob_banner_id // empty')
          ADMOB_INTERSTITIAL=$(echo "$CONFIG" | jq -r '.admob_interstitial_id // empty')
          BUILD_AAB=$(echo "$CONFIG" | jq -r '.build_aab // false')

          # Package name
          if [ -n "$CUSTOM_PKG" ] && [ "$CUSTOM_PKG" != "null" ]; then
            PACKAGE_NAME="$CUSTOM_PKG"
          else
            PACKAGE_NAME="com.webtoapk.$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | head -c 30)"
          fi

          PACKAGE_PATH="$(echo $PACKAGE_NAME | tr '.' '/')"

          # Create directories
          mkdir -p "app/src/main/java/${PACKAGE_PATH}"
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # Download/generate icon
          if [ -n "$ICON_URL" ] && [ "$ICON_URL" != "null" ]; then
            curl -sL "$ICON_URL" -o /tmp/icon_original.png
            for size_dir in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
              SIZE="${size_dir%%:*}"
              DIR="${size_dir##*:}"
              convert /tmp/icon_original.png -resize ${SIZE}x${SIZE} "app/src/main/res/${DIR}/ic_launcher.png"
            done
          else
            for size_dir in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
              SIZE="${size_dir%%:*}"
              DIR="${size_dir##*:}"
              convert -size ${SIZE}x${SIZE} xc:"${SPLASH_COLOR:-#10B981}" -fill white -gravity center -pointsize $((SIZE/3)) -annotate 0 'W' "app/src/main/res/${DIR}/ic_launcher.png"
            done
          fi

          # Splash screen drawable
          cat > app/src/main/res/drawable/splash_background.xml << SPLASH
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item><shape><solid android:color="${SPLASH_COLOR:-#10B981}" /></shape></item>
          </layer-list>
          SPLASH

          # settings.gradle
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WebToAPK"
          include ':app'
          SETTINGS

          # Root build.gradle
          cat > build.gradle << 'ROOT_BUILD'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          ROOT_BUILD

          # gradle.properties
          cat > gradle.properties << 'PROPS'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

          # AdMob dependency
          ADMOB_DEP=""
          if [ "$ENABLE_ADMOB" = "true" ]; then
            ADMOB_DEP="implementation 'com.google.android.gms:play-services-ads:23.1.0'"
          fi

          # App build.gradle
          cat > app/build.gradle << APPBUILD
          plugins {
              id 'com.android.application'
          }

          android {
              namespace '${PACKAGE_NAME}'
              compileSdk 34

              defaultConfig {
                  applicationId "${PACKAGE_NAME}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.8.0'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
              ${ADMOB_DEP}
          }
          APPBUILD

          # Offline HTML page
          if [ "$ENABLE_OFFLINE" = "true" ]; then
            mkdir -p app/src/main/assets
            cat > app/src/main/assets/offline.html << OFFHTML
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Offline</title>
            <style>
              body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; text-align: center; }
              .container { padding: 40px; }
              h1 { font-size: 1.5rem; margin-bottom: 12px; }
              p { color: #666; }
              button { margin-top: 20px; padding: 12px 24px; background: ${SPLASH_COLOR:-#10B981}; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>📶 No Connection</h1>
              <p>${OFFLINE_MSG:-You are offline. Please check your connection.}</p>
              <button onclick="location.reload()">Retry</button>
            </div>
          </body>
          </html>
          OFFHTML
          fi

          # Build AndroidManifest.xml
          INTERNET_PERM='<uses-permission android:name="android.permission.INTERNET" />'
          NETWORK_PERM='<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'

          cat > app/src/main/AndroidManifest.xml << MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              ${INTERNET_PERM}
              ${NETWORK_PERM}

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${APP_NAME}"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name=".SplashActivity"
                      android:exported="true"
                      android:theme="@style/SplashTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".MainActivity"
                      android:exported="false"
                      android:configChanges="orientation|screenSize" />
              </application>
          </manifest>
          MANIFEST

          # Styles with splash theme
          cat > app/src/main/res/values/styles.xml << STYLES
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:statusBarColor">${STATUS_BAR_COLOR:-#000000}</item>
              </style>
              <style name="SplashTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@drawable/splash_background</item>
                  <item name="android:statusBarColor">${SPLASH_COLOR:-#10B981}</item>
              </style>
          </resources>
          STYLES

          # SplashActivity.java
          cat > "app/src/main/java/${PACKAGE_PATH}/SplashActivity.java" << SPLASH_JAVA
          package ${PACKAGE_NAME};

          import android.content.Intent;
          import android.os.Bundle;
          import android.os.Handler;
          import androidx.appcompat.app.AppCompatActivity;

          public class SplashActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  new Handler().postDelayed(() -> {
                      startActivity(new Intent(this, MainActivity.class));
                      finish();
                  }, 1500);
              }
          }
          SPLASH_JAVA

          # Build cookie manager setup
          COOKIE_SETUP=""
          if [ "$ENABLE_COOKIES" = "true" ] || [ "$ENABLE_COOKIES" = "" ]; then
            COOKIE_SETUP="android.webkit.CookieManager cookieManager = android.webkit.CookieManager.getInstance();
                  cookieManager.setAcceptCookie(true);
                  cookieManager.setAcceptThirdPartyCookies(webView, true);"
          fi

          # Build offline check
          OFFLINE_CHECK=""
          if [ "$ENABLE_OFFLINE" = "true" ]; then
            OFFLINE_CHECK='
              webView.setWebViewClient(new WebViewClient() {
                  @Override
                  public void onReceivedError(WebView view, int errorCode, String description, String failingUrl) {
                      view.loadUrl("file:///android_asset/offline.html");
                  }
              });'
          else
            OFFLINE_CHECK='webView.setWebViewClient(new WebViewClient());'
          fi

          # Build AdMob init
          ADMOB_IMPORT=""
          ADMOB_INIT=""
          ADMOB_LAYOUT_FIELD=""
          ADMOB_BANNER_SETUP=""
          if [ "$ENABLE_ADMOB" = "true" ] && [ -n "$ADMOB_BANNER" ] && [ "$ADMOB_BANNER" != "null" ]; then
            ADMOB_IMPORT="import com.google.android.gms.ads.MobileAds;
          import com.google.android.gms.ads.AdRequest;
          import com.google.android.gms.ads.AdView;
          import com.google.android.gms.ads.AdSize;"
            ADMOB_INIT="MobileAds.initialize(this, initializationStatus -> {});"
            ADMOB_LAYOUT_FIELD="private AdView adView;"
            ADMOB_BANNER_SETUP="adView = findViewById(R.id.adView);
                  AdRequest adRequest = new AdRequest.Builder().build();
                  adView.loadAd(adRequest);"
          fi

          # MainActivity.java
          cat > "app/src/main/java/${PACKAGE_PATH}/MainActivity.java" << MAIN
          package ${PACKAGE_NAME};

          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.view.KeyEvent;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.content.Context;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.swiperefreshlayout.widget.SwipeRefreshLayout;
          ${ADMOB_IMPORT}

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private SwipeRefreshLayout swipeRefresh;
              ${ADMOB_LAYOUT_FIELD}

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  webView = findViewById(R.id.webview);
                  swipeRefresh = findViewById(R.id.swipe_refresh);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setAllowFileAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setDatabaseEnabled(true);

                  ${COOKIE_SETUP}

                  webView.setWebChromeClient(new WebChromeClient());
                  ${OFFLINE_CHECK}

                  swipeRefresh.setOnRefreshListener(() -> {
                      webView.reload();
                      swipeRefresh.setRefreshing(false);
                  });

                  ${ADMOB_INIT}
                  ${ADMOB_BANNER_SETUP}

                  webView.loadUrl("${WEBSITE_URL}");
              }

              private boolean isOnline() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                  NetworkInfo netInfo = cm.getActiveNetworkInfo();
                  return netInfo != null && netInfo.isConnectedOrConnecting();
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                      webView.goBack();
                      return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }
          }
          MAIN

          # Layout XML - with optional AdMob banner
          if [ "$ENABLE_ADMOB" = "true" ] && [ -n "$ADMOB_BANNER" ] && [ "$ADMOB_BANNER" != "null" ]; then
            cat > app/src/main/res/layout/activity_main.xml << LAYOUT
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:ads="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical">
              <androidx.swiperefreshlayout.widget.SwipeRefreshLayout
                  android:id="@+id/swipe_refresh"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1">
                  <WebView
                      android:id="@+id/webview"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent" />
              </androidx.swiperefreshlayout.widget.SwipeRefreshLayout>
              <com.google.android.gms.ads.AdView
                  android:id="@+id/adView"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  ads:adSize="BANNER"
                  ads:adUnitId="${ADMOB_BANNER}" />
          </LinearLayout>
          LAYOUT
          else
            cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.swiperefreshlayout.widget.SwipeRefreshLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/swipe_refresh"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView
                  android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </androidx.swiperefreshlayout.widget.SwipeRefreshLayout>
          LAYOUT
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK or AAB
        run: |
          BUILD_AAB="${{ github.event.client_payload.build_aab }}"
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          if [ "$BUILD_AAB" = "true" ]; then
            ./gradlew bundleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK artifact
        if: ${{ github.event.client_payload.build_aab != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: "apk-${{ github.event.client_payload.build_id }}"
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload AAB artifact
        if: ${{ github.event.client_payload.build_aab == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: "apk-${{ github.event.client_payload.build_id }}"
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 7

      - name: Notify completion
        if: always()
        run: |
          BUILD_ID="${{ github.event.client_payload.build_id }}"
          CALLBACK_URL="${{ github.event.client_payload.callback_url }}"
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"

          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\"}"
          fi
