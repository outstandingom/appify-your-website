name: Build WebView APK

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_ID: ${{ github.event.client_payload.build_id }}
      CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      APP_CONFIG: ${{ github.event.client_payload.config }}

    steps:
      # ── Step 1: Checkout & Setup ──
      - name: "Setup — Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup — Install JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "Setup — Install Python 3 & ImageMagick"
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick python3
          python3 --version

      # ── Step 2: Run Python Orchestrator ──
      - name: "Orchestrator — Generate Android project"
        run: python3 orchestrator.py

      # ── Step 3: Gradle Build ──
      - name: "Build — Setup Gradle"
        uses: gradle/actions/setup-gradle@v3

      - name: "Build — Compile APK or AAB"
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

          if [ -f ".build_aab" ]; then
            echo "Building AAB (release)..."
            ./gradlew bundleRelease --no-daemon --stacktrace
          else
            echo "Building APK (debug)..."
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      # ── Step 4: Upload & Notify ──
      - name: "Artifact — Upload APK/AAB"
        uses: actions/upload-artifact@v4
        with:
          name: "apk-${{ github.event.client_payload.build_id }}"
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 7

      - name: "Callback — Notify build result"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"

          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\"}"
          fi
