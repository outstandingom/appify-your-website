      # ──────────────────────────────────────────────
      # MODULE 12: App build.gradle (dependencies)
      # ──────────────────────────────────────────────
      - name: "Module 12 — App build.gradle with conditional dependencies"
        run: |
          ADMOB_DEP=""
          if [ "$ENABLE_ADMOB" = "true" ]; then
            ADMOB_DEP="    implementation 'com.google.android.gms:play-services-ads:23.1.0'"
          fi

          cat > app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace '${PACKAGE_NAME}'
              compileSdk 34

              defaultConfig {
                  applicationId "${PACKAGE_NAME}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.8.0'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
              implementation 'androidx.core:core:1.12.0'
          ${ADMOB_DEP}
          }
          EOF

      # ──────────────────────────────────────────────
      # MODULE 13: Build APK/AAB
      # ──────────────────────────────────────────────
      - name: "Module 13 — Setup Gradle"
        uses: gradle/actions/setup-gradle@v3

      - name: "Module 13 — Build APK or AAB"
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          if [ "$BUILD_AAB" = "true" ]; then
            ./gradlew bundleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      # ──────────────────────────────────────────────
      # MODULE 14: Upload & Notify
      # ──────────────────────────────────────────────
      - name: "Module 14 — Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "apk-${{ github.event.client_payload.build_id }}"
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
          retention-days: 7

      - name: "Module 14 — Notify callback"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"

          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\"}"
          fi
