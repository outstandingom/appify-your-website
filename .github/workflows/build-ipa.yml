name: Build WebView IPA (iOS)

on:
  repository_dispatch:
    types: [build-ipa]

jobs:
  build:
    runs-on: macos-14
    env:
      BUILD_ID: ${{ github.event.client_payload.build_id }}
      CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      APP_CONFIG: ${{ github.event.client_payload.config }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate iOS Xcode project
        run: python3 ios_orchestrator.py

      - name: Build unsigned .app
        run: |
          set -e
          cd ios-app
          xcodebuild \
            -project WebApp.xcodeproj \
            -scheme WebApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package .app into unsigned .ipa
        run: |
          set -e
          cd ios-app
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 2 -name "*.app" | head -n 1)
          echo "App path: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "No .app produced"; exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          mkdir -p ../ios-output
          zip -qr "../ios-output/WebApp-unsigned.ipa" Payload
          ls -la ../ios-output

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: "apk-${{ github.event.client_payload.build_id }}"
          path: ios-output/*.ipa
          retention-days: 7

      - name: Notify build result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"
          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\"}"
          fi
