name: Build WebView IPA (iOS)

on:
  repository_dispatch:
    types: [build-ipa]

jobs:
  build:
    runs-on: macos-14
    env:
      BUILD_ID: ${{ github.event.client_payload.build_id }}
      CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      APP_CONFIG: ${{ github.event.client_payload.config }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jq
        run: brew install jq

      - name: Generate iOS Xcode project
        run: python3 ios_orchestrator.py

      - name: Build unsigned .app for real device (arm64)
        run: |
          set -e
          cd ios-app
          xcodebuild \
            -project WebApp.xcodeproj \
            -scheme WebApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            build

      - name: Package .app into unsigned .ipa
        run: |
          set -e
          cd ios-app
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 2 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "No .app produced"; exit 1; fi
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          mkdir -p ../out
          zip -qr "../out/app.ipa" Payload
          ls -la ../out

      - name: Upload artifact to GitHub
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ env.BUILD_ID }}
          path: out/*
          retention-days: 7

      - name: Update Supabase with artifact URL
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BUILD_ID: ${{ env.BUILD_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "🔍 Getting artifact URL..."
          
          # Get artifact URL and CLEAN it (remove hidden characters)
          RAW_URL=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            | jq -r '.artifacts[0].archive_download_url')
          
          # Clean the URL - remove carriage returns, newlines, and trim whitespace
          ARTIFACT_URL=$(echo "$RAW_URL" | tr -d '\r\n' | xargs)
          
          echo "📦 Raw URL: $RAW_URL"
          echo "📦 Clean URL: $ARTIFACT_URL"
          
          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "❌ No artifact URL found"
            exit 1
          fi
          
          # Verify URL format - must start with https://
          if [[ ! "$ARTIFACT_URL" =~ ^https:// ]]; then
            echo "❌ Invalid URL format: $ARTIFACT_URL"
            exit 1
          fi
          
          echo "📤 Updating Supabase with artifact URL..."
          
          UPDATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Create JSON using printf
          printf '{"build_url":"%s","status":"completed","updated_at":"%s"}\n' \
            "$ARTIFACT_URL" "$UPDATED_AT" > patch_data.json
          
          echo "📄 JSON payload:"
          cat patch_data.json
          
          # Use the file for the request
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH \
            "$SUPABASE_URL/rest/v1/apk_builds?build_id=eq.$BUILD_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @patch_data.json)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 HTTP Status: $HTTP_CODE"
          echo "📊 Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Supabase updated successfully!"
          else
            echo "❌ Supabase update failed with status: $HTTP_CODE"
            exit 1
          fi

      - name: Notify build result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"
          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\"}"
          fi
