name: Build WebView IPA (iOS)

on:
  repository_dispatch:
    types: [build-ipa]

jobs:
  build:
    runs-on: macos-14
    env:
      BUILD_ID: ${{ github.event.client_payload.build_id }}
      CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      UPLOAD_URL: ${{ github.event.client_payload.upload_url }}
      ARTIFACT_PATH: ${{ github.event.client_payload.artifact_path }}
      APP_CONFIG: ${{ github.event.client_payload.config }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate iOS Xcode project
        run: python3 ios_orchestrator.py

      - name: Build unsigned .app for real device (arm64)
        run: |
          set -e
          cd ios-app
          xcodebuild \
            -project WebApp.xcodeproj \
            -scheme WebApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            build

      - name: Package .app into unsigned .ipa
        id: package
        run: |
          set -e
          cd ios-app
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 2 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "No .app produced"; exit 1; fi
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          mkdir -p ../ios-output
          zip -qr "../ios-output/WebApp-unsigned.ipa" Payload
          echo "artifact_file=ios-output/WebApp-unsigned.ipa" >> "$GITHUB_OUTPUT"
          ls -la ../ios-output

      - name: Upload artifact to Lovable Cloud storage
        run: |
          set -e
          FILE="${{ steps.package.outputs.artifact_file }}"
          echo "Uploading $FILE to $ARTIFACT_PATH"
          curl --fail-with-body -X PUT \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary "@${FILE}" \
            "$UPLOAD_URL"

      - name: Notify build result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_ID="${{ github.run_id }}"
          if [ -n "$CALLBACK_URL" ]; then
            curl -s -X POST "$CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"build_id\": \"$BUILD_ID\", \"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\", \"artifact_path\": \"$ARTIFACT_PATH\"}"
          fi
